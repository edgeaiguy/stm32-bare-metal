<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="Consolas, monospace">
  <!-- Background -->
  <rect width="900" height="320" fill="#1a1a2e" rx="8"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">UART Signal Path: STM32F407 → CP2102 → PC</text>
  
  <!-- STM32 Box -->
  <rect x="30" y="70" width="220" height="200" rx="6" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <text x="140" y="95" text-anchor="middle" fill="#e94560" font-size="13" font-weight="bold">STM32F407VG</text>
  
  <!-- USART2 sub-box -->
  <rect x="50" y="110" width="180" height="60" rx="4" fill="#0f3460" stroke="#533483" stroke-width="1.5"/>
  <text x="140" y="133" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="bold">USART2</text>
  <text x="140" y="150" text-anchor="middle" fill="#a0a0a0" font-size="9">BRR=0x008B (115200 baud)</text>
  <text x="140" y="163" text-anchor="middle" fill="#a0a0a0" font-size="9">CR1: UE=1, TE=1</text>
  
  <!-- GPIO sub-box -->
  <rect x="50" y="180" width="180" height="75" rx="4" fill="#0f3460" stroke="#533483" stroke-width="1.5"/>
  <text x="140" y="200" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="bold">GPIOA (AF7)</text>
  <text x="140" y="218" text-anchor="middle" fill="#4ecca3" font-size="10">PA2 → USART2_TX</text>
  <text x="140" y="236" text-anchor="middle" fill="#4ecca3" font-size="10">PA3 → USART2_RX</text>
  <text x="140" y="250" text-anchor="middle" fill="#a0a0a0" font-size="8">MODER=10 (Alt Func)</text>
  
  <!-- Wires -->
  <rect x="260" y="90" width="160" height="170" rx="6" fill="#16213e" stroke="#0f3460" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="340" y="115" text-anchor="middle" fill="#a0a0a0" font-size="11" font-weight="bold">Dupont Wires</text>
  <text x="340" y="135" text-anchor="middle" fill="#a0a0a0" font-size="9">(P1 Header)</text>
  
  <!-- Wire labels -->
  <text x="340" y="165" text-anchor="middle" fill="#e94560" font-size="10">PA2 (TX) → RXD</text>
  <text x="340" y="185" text-anchor="middle" fill="#4ecca3" font-size="10">PA3 (RX) ← TXD</text>
  <text x="340" y="205" text-anchor="middle" fill="#a0a0a0" font-size="10">GND → GND</text>
  
  <text x="340" y="240" text-anchor="middle" fill="#e94560" font-size="9" font-style="italic">TX↔RX crossover!</text>
  
  <!-- Arrows STM32 to Wires -->
  <line x1="230" y1="175" x2="260" y2="175" stroke="#4ecca3" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- CP2102 Box -->
  <rect x="430" y="90" width="180" height="170" rx="6" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <text x="520" y="118" text-anchor="middle" fill="#e94560" font-size="13" font-weight="bold">CP2102</text>
  <text x="520" y="138" text-anchor="middle" fill="#a0a0a0" font-size="10">USB-to-Serial</text>
  <text x="520" y="155" text-anchor="middle" fill="#a0a0a0" font-size="10">Adapter</text>
  
  <text x="520" y="185" text-anchor="middle" fill="#e0e0e0" font-size="10">RXD ← PA2 data</text>
  <text x="520" y="205" text-anchor="middle" fill="#e0e0e0" font-size="10">TXD → PA3 data</text>
  <text x="520" y="225" text-anchor="middle" fill="#e0e0e0" font-size="10">GND (shared)</text>
  <text x="520" y="245" text-anchor="middle" fill="#a0a0a0" font-size="9">3.3V TTL levels</text>
  
  <!-- Arrow Wires to CP2102 -->
  <line x1="420" y1="175" x2="430" y2="175" stroke="#4ecca3" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- USB Cable -->
  <rect x="620" y="130" width="70" height="100" rx="6" fill="#16213e" stroke="#0f3460" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="655" y="165" text-anchor="middle" fill="#a0a0a0" font-size="10" font-weight="bold">USB</text>
  <text x="655" y="182" text-anchor="middle" fill="#a0a0a0" font-size="9">Cable</text>
  <text x="655" y="215" text-anchor="middle" fill="#a0a0a0" font-size="8">/dev/ttyUSB0</text>
  
  <!-- Arrow CP2102 to USB -->
  <line x1="610" y1="175" x2="620" y2="175" stroke="#4ecca3" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- PC Box -->
  <rect x="700" y="90" width="180" height="170" rx="6" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <text x="790" y="118" text-anchor="middle" fill="#e94560" font-size="13" font-weight="bold">Ubuntu PC</text>
  
  <rect x="720" y="135" width="140" height="50" rx="4" fill="#0f3460" stroke="#533483" stroke-width="1.5"/>
  <text x="790" y="157" text-anchor="middle" fill="#4ecca3" font-size="11" font-weight="bold">picocom</text>
  <text x="790" y="175" text-anchor="middle" fill="#a0a0a0" font-size="9">-b 115200 /dev/ttyUSB0</text>
  
  <rect x="720" y="195" width="140" height="50" rx="4" fill="#0f3460" stroke="#533483" stroke-width="1.5"/>
  <text x="790" y="215" text-anchor="middle" fill="#e0e0e0" font-size="10">Output:</text>
  <text x="790" y="232" text-anchor="middle" fill="#4ecca3" font-size="10">Hello from bare metal</text>
  
  <!-- Arrow USB to PC -->
  <line x1="690" y1="175" x2="700" y2="175" stroke="#4ecca3" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Clock info at bottom -->
  <text x="450" y="300" text-anchor="middle" fill="#a0a0a0" font-size="10">Clock: 16 MHz HSI → APB1 (÷1) → USART2 → BRR divider → 115200 baud bit timing</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ecca3"/>
    </marker>
  </defs>
</svg>
